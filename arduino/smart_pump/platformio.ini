[platformio]
src_dir = .

; Option A — espressif32 officiel 6.9.0 (compatible Python 3.13)
[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino

; Option B — pioarduino fork (si Option A échoue encore avec Python 3.13)
; Pour basculer : commenter [env:esp32dev] ci-dessus et décommenter [env:esp32dev_pio] ci-dessous
; puis relancer : pio run -e esp32dev_pio -t upload --upload-port COM23
;[env:esp32dev_pio]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
;board = esp32dev
;framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = dio
board_build.f_flash = 40000000L
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv

lib_deps =
  mathieucarbou/TinyGSM @ ^0.11.9
  4-20ma/ModbusMaster @ ^2.0.1
  mikalhart/TinyGPSPlus @ ^1.1.0
  bblanchon/ArduinoJson @ ^7.4.3
